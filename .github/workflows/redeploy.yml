name: Trigger Coolify Redeploy

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
    secrets:
      COOLIFY_DEPLOY_WEBHOOK_URL: { required: true }

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Call Coolify Deploy Webhook
        env:
          COOLIFY_DEPLOY_WEBHOOK_URL: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$COOLIFY_DEPLOY_WEBHOOK_URL" ]; then
            echo "COOLIFY_DEPLOY_WEBHOOK_URL secret not set. Skipping redeploy."
            exit 0
          else
            curl -X POST "$COOLIFY_DEPLOY_WEBHOOK_URL"
          fi
